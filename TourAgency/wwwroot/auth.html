<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация — Поехали!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-container {
            max-width: 450px;
            margin: 4rem auto;
            padding: 0 1.5rem;
        }
        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .auth-tab {
            background: none;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.3s ease;
        }
        .auth-tab.active {
            color: var(--primary);
        }
        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -9px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            border-radius: 1px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div class="header-content">
                <a href="/tours" class="logo">🌍 Поехали!</a>
            </div>
        </header>

        <main class="main-container">
            <div class="auth-container">
                <div class="tour-reviews-section">
                    <div class="auth-tabs">
                        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Вход</button>
                        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Регистрация</button>
                    </div>

                    <div id="auth-error" class="error-message hidden"></div>

                    <form id="auth-form" class="form-group" style="gap: 1.25rem;">
                        <div class="form-group">
                            <label for="auth-username">Имя пользователя (Name)</label>
                            <input type="text" id="auth-username" required placeholder="Введите ваше имя">
                        </div>
                        
                        <div class="form-group">
                            <label for="auth-password">Пароль (Password)</label>
                            <input type="password" id="auth-password" required placeholder="••••••••">
                        </div>
                        
                        <button type="submit" id="auth-submit-btn" class="btn-submit" style="margin-top: 0.5rem;">Войти</button>
                    </form>
                </div>
            </div>
        </main>

        <footer>
            <p>© 2026 Поехали! Все права защищены. 🧳</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
