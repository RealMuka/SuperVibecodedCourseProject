<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали тура — Поехали!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="wrapper">
<header>
            <div class="header-content">
                <a href="/tours" class="logo">🌍 Поехали!</a>
                <div class="user-menu" id="user-menu">
                    <button class="user-menu-btn" id="user-menu-btn">
                        <span class="user-avatar-small" id="user-avatar-small">👤</span>
                        <span class="user-name" id="user-name-header">Войти</span>
                        <span class="user-menu-arrow">▼</span>
                    </button>
                    <div class="user-menu-dropdown hidden" id="user-menu-dropdown">
                        <a href="/tours" class="user-menu-item">🏠 Главная</a>
                        <a href="/profile" class="user-menu-item" id="profile-menu-item">👤 Профиль</a>
                        <button class="user-menu-item" id="logout-btn-dropdown">🚪 Выйти</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-container">
            <a href="/tours" class="btn-back">← Назад к турам</a>
            
            <div id="error-container" class="error-message hidden"></div>
            <div id="tour-loading" class="loading">✨ Загружаем детали тура...</div>

            <div id="tour-details" class="tour-detail-grid hidden">
                <!-- Карточка тура с изображением -->
                <div class="tour-detail-card">
                    <img id="tour-image" src="" alt="Изображение тура" class="tour-detail-image">
                    <div class="tour-detail-info">
                        <div class="tour-meta">
                            <span class="tour-badge" id="tour-category">Категория</span>
                            <span class="tour-rating-badge" id="tour-rating">⭐ 0.0</span>
                        </div>
                        <h1 id="tour-title">Название тура</h1>
                        <div class="tour-price-display" id="tour-price">0 ₽</div>
                        <p class="tour-description" id="tour-description">Описание...</p>
                        <button class="aplication-btn">Запросить тур</button>
                    </div>
                </div>

                <div class="tour-reviews-section">
                    <h2>Отзывы путешественников</h2>
                    
                    <form id="review-form" class="review-form-box">
                        <h3>Оставить отзыв</h3>
                        
                        <div class="form-grid">
                            <div class="form-group">
                                <label>Ваше имя</label>
                                <input type="text" id="review-username" readonly class="input-readonly">
                            </div>
                            
                            <div class="form-group">
                                <label for="review-rating">Оценка</label>
                                <select id="review-rating" required>
                                    <option value="5">⭐⭐⭐⭐⭐ 5 звезд</option>
                                    <option value="4">⭐⭐⭐⭐ 4 звезды</option>
                                    <option value="3">⭐⭐⭐ 3 звезды</option>
                                    <option value="2">⭐⭐ 2 звезды</option>
                                    <option value="1">⭐ 1 звезда</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="review-text">Ваш отзыв</label>
                            <textarea id="review-text" rows="4" required placeholder="Поделитесь впечатлениями от поездки..."></textarea>
                        </div>
                        
                        <button type="submit" class="btn-submit">Отправить отзыв</button>
                    </form>

                    <div class="reviews-bento-list" id="reviews-container">

                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p>© 2026 Поехали! Все права защищены. 🧳</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
    <script src="js/tour.js"></script>
</body>
</html>
